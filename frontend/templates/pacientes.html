{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h2>Pacientes registrados</h2>
    <a href="{{ url_for('nuevo_paciente') }}" class="btn btn-primary">+ Nuevo Paciente</a>
</div>

<div class="search-bar">
    <input type="text" id="buscador" placeholder="🔍 Buscar por nombre, cédula o email..." onkeyup="filtrarTabla()">
</div>

<div class="table-wrapper">
    <table id="tabla-pacientes">
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Cédula</th><th>Email</th><th>Teléfono</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for p in pacientes %}
            <tr>
                <td>{{ p.id }}</td>
                <td><a href="{{ url_for('detalle_paciente', paciente_id=p.id) }}">{{ p.nombre }}</a></td>
                <td>{{ p.cedula }}</td>
                <td>{{ p.email }}</td>
                <td>{{ p.telefono }}</td>
                <td>
                    <a href="{{ url_for('detalle_paciente', paciente_id=p.id) }}" class="btn btn-secondary btn-sm">Ver</a>
                    <form method="POST" action="{{ url_for('eliminar_paciente', paciente_id=p.id) }}" style="display:inline" onsubmit="return confirmar('¿Eliminar este paciente?')">
                        <button type="submit" class="btn btn-danger btn-sm">Eliminar</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="6" class="empty">No hay pacientes registrados.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
function filtrarTabla() {
    const input = document.getElementById("buscador").value.toLowerCase();
    const filas = document.querySelectorAll("#tabla-pacientes tbody tr");
    filas.forEach(fila => {
        fila.style.display = fila.textContent.toLowerCase().includes(input) ? "" : "none";
    });
}
function confirmar(msg) { return confirm(msg); }
</script>
{% endblock %}
