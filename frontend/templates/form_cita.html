{% extends "base.html" %}
{% block content %}
<h2>Agendar Cita</h2>
<form method="POST">
    <label>ID Paciente: <input type="number" name="paciente_id" required></label><br>
    <label>Fecha: <input type="datetime-local" name="fecha" required></label><br>
    <label>Medico: <input type="text" name="medico" required></label><br>
    <button type="submit">Guardar</button>
    <a href="{{ url_for('citas') }}">Cancelar</a>
</form>
{% endblock %}
